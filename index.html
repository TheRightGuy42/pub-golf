<body>
    <div id="app">
        <!-- 1. LOBBY SCREEN -->
        <div id="lobby-screen" class="screen active">
            <h1>Tavern Crawl</h1>
            <div class="parchment-card">
                <h2>Join a Guild</h2>
                <input type="text" id="join-code" placeholder="Game Code (e.g. A1B2)">
                <input type="text" id="player-name" placeholder="Your Name">
                <button onclick="joinGame()">Enter Tavern</button>
            </div>
            
            <div class="divider">~ OR ~</div>
            
            <div class="parchment-card dark-wood">
                <h2 style="color: #f4e4bc;">Forge a New Quest</h2>
                <input type="password" id="gm-passcode" placeholder="Set GM Passcode">
                <button onclick="createGame()" class="gold-btn">Create Game</button>
            </div>
        </div>

        <!-- 2. TEAM SELECTION SCREEN -->
        <div id="team-screen" class="screen">
            <h1>Join a Guild</h1>
            <div class="parchment-card" id="team-list">
                <!-- Teams will be injected here by JavaScript -->
            </div>
        </div>

        <!-- 3. MAIN GAME SCREEN -->
        <div id="game-screen" class="screen">
            <header class="dark-wood">
                <div class="header-info">
                    <span id="display-role">Adventurer</span>
                    <span id="display-code">Code: <b>----</b></span>
                </div>
                <nav id="tabs">
                    <button class="tab-btn gm-only active" onclick="switchTab('setup')">Setup</button>
                    <button class="tab-btn player-only" onclick="switchTab('card')">Card</button>
                    <button class="tab-btn gm-only" onclick="switchTab('quests')">Quests</button>
                    <button class="tab-btn" onclick="switchTab('board')">Board</button>
                    <button class="tab-btn" onclick="switchTab('log')">Log</button>
                </nav>
            </header>

            <main id="tab-content">
                <!-- Content injected by JavaScript -->
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
