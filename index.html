<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pub golf: Quest Master</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    
    <!-- Firebase SDK (Compat version for vanilla JS)  -->
    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="app">
        <!-- LOBBY SCREEN -->
        <div id="lobby-screen" class="screen active">
            <h1>Tavern Crawl</h1>
            <div class="parchment-card">
                <h2>Join a Guild</h2>
                <input type="text" id="join-code" placeholder="Game Code (e.g. A1B2)" uppercase>
                <input type="text" id="player-name" placeholder="Your Name">
                <button onclick="joinGame()">Enter Tavern</button>
            </div>
            
            <div class="divider">~ OR ~</div>
            
            <div class="parchment-card dark-wood">
                <h2 style="color: #f4e4bc;">Forge a New Quest</h2>
                <p style="color: #ccc; font-size: 0.9em;">For Quest Masters only</p>
                <input type="password" id="gm-passcode" placeholder="Set GM Passcode">
                <button onclick="createGame()" class="gold-btn">Create Game</button>
            </div>
        </div>

        <!-- MAIN GAME SCREEN -->
        <div id="game-screen" class="screen">
            <header class="dark-wood">
                <div class="header-info">
                    <span id="display-role">Adventurer</span>
                    <span id="display-code">Code: <b>----</b></span>
                </div>
                <nav id="tabs">
                    <button class="tab-btn gm-only" onclick="switchTab('setup')">Setup</button>
                    <button class="tab-btn active" onclick="switchTab('card')">Card</button>
                    <button class="tab-btn gm-only" onclick="switchTab('quests')">Quests</button>
                    <button class="tab-btn" onclick="switchTab('board')">Board</button>
                    <button class="tab-btn" onclick="switchTab('log')">Log</button>
                </nav>
            </header>

            <main id="tab-content">
                <!-- Content injected by JavaScript based on active tab -->
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
