<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#2E1B12" />
<title>The Tavern Open</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Cutive+Mono&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app" id="app">
  <header class="app-header">
    <div class="seal-icon">
      <svg viewBox="0 0 40 40" aria-hidden="true">
        <circle cx="20" cy="19" r="15" fill="var(--crimson)"/>
        <circle cx="20" cy="19" r="12.3" fill="none" stroke="var(--gold)" stroke-width="1.2"/>
        <rect x="18.7" y="11" width="2.6" height="13" fill="var(--gold)"/>
        <polygon points="15.5,11 24.5,11 21.8,16.5 18.2,16.5" fill="var(--gold)"/>
        <ellipse cx="20" cy="24.5" rx="4" ry="1.8" fill="var(--gold)"/>
      </svg>
    </div>
    <div class="header-text">
      <p class="eyebrow" id="header-eyebrow">The Tavern Open</p>
      <h1 id="course-name">Gather Thy Guild</h1>
    </div>
    <button class="icon-btn" id="menu-btn" aria-label="Menu">⋮</button>
  </header>

  <main id="main-content"></main>

  <nav class="tab-bar" id="tab-bar" style="display:none;">
    <button class="tab-btn" data-tab="card"><span class="tab-num">I</span><span>Card</span></button>
    <button class="tab-btn" data-tab="quests"><span class="tab-num">II</span><span>Quests</span></button>
    <button class="tab-btn" data-tab="board"><span class="tab-num">III</span><span>Standings</span></button>
    <button class="tab-btn" data-tab="log"><span class="tab-num">IV</span><span>Chronicle</span></button>
  </nav>
</div>

<div class="modal-layer" id="modal-layer"></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  }
</script>
</body>
</html>
